<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body { font-family: Arial, sans-serif; overflow: hidden; }
        canvas { background: black; display: block; margin: 0 auto; }
    </style>
</head>
<body>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('pong');
        const ctx = canvas.getContext('2d');

        // Create the pong paddle
        const paddleWidth = 10, paddleHeight = 100;
        const player = { x: 0, y: (canvas.height - paddleHeight) / 2, width: paddleWidth, height: paddleHeight, color: "#00ff00", score: 0 };
        const computer = { x: canvas.width - paddleWidth, y: (canvas.height - paddleHeight) / 2, width: paddleWidth, height: paddleHeight, color: "#ff0000", score: 0 };

        // Create the pong ball
        const ball = { x: canvas.width / 2, y: canvas.height / 2, size: 10, speed: 5, velocityX: 5, velocityY: 5, color: "#ffffff" };

        // Draw the net
        function drawNet() {
            for (let i = 0; i <= canvas.height; i += 15) {
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(canvas.width / 2 - 1, i, 2, 10);
            }
        }

        // Draw everything
        function draw() {
            // Clear the canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Draw the paddles and ball
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = computer.color;
            ctx.fillRect(computer.x, computer.y, computer.width, computer.height);
            ctx.fillStyle = ball.color;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.size, 0, Math.PI * 2, false);
            ctx.fill();
            drawNet();
        }

        // Update game objects
        function update() {
            ball.x += ball.velocityX;
            ball.y += ball.velocityY;

            // Ball collision with top and bottom
            if (ball.y + ball.size >= canvas.height || ball.y - ball.size <= 0) {
                ball.velocityY = -ball.velocityY;
            }

            // Ball collision with paddles
            let playerPaddle = (ball.x < canvas.width / 2) ? player : computer;
            if (collision(ball, playerPaddle)) {
                ball.velocityX = -ball.velocityX;
            }

            // Reset ball if it goes out of bounds
            if (ball.x + ball.size < 0) {
                computer.score++;
                resetBall();
            } else if (ball.x - ball.size > canvas.width) {
                player.score++;
                resetBall();
            }

            // Computer AI
            computer.y += (ball.y - (computer.y + computer.height / 2)) * 0.1;
        }

        // Ball and paddle collision detection
        function collision(ball, paddle) {
            return ball.x < paddle.x + paddle.width && ball.x + ball.size > paddle.x && ball.y < paddle.y + paddle.height && ball.y + ball.size > paddle.y;
        }

        // Reset the ball to the center
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.velocityX = -ball.velocityX;
        }

        // Control the player paddle
        document.addEventListener('mousemove', (event) => {
            const rect = canvas.getBoundingClientRect();
            player.y = event.clientY - rect.top - player.height / 2;
        });

        // Main game loop
        function game() {
            draw();
            update();
            requestAnimationFrame(game);
        }

        // Start the game
        game();
    </script>
</body>
</html>
